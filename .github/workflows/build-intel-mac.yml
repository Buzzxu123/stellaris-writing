name: Build Intel macOS DMG

on:
  workflow_dispatch:

jobs:
  macos-intel:
    name: Intel macOS DMG
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Intel macOS installer
        run: npm run desktop:build

      - name: Verify Intel architecture
        shell: bash
        run: |
          find "src-tauri/target/release/bundle/macos" -type f -perm -111 -exec file {} \; | tee /tmp/stellaris-architectures.txt
          grep -q "x86_64" /tmp/stellaris-architectures.txt

      - name: Upload Intel DMG
        uses: actions/upload-artifact@v4
        with:
          name: Stellaris-Writing-macOS-Intel
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
